<!DOCTYPE html>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f9f9f9;
      color: #333;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #007bff;
    }

    .name-section {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.8rem;
      font-weight: bold;
      color: #007bff;
    }

    .verified-badge {
      width: 22px;
      height: 22px;
      background: linear-gradient(45deg, #1da1f2, #0d8ddb);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 0 4px rgba(29,161,242,0.7);
    }

    .username {
      font-size: 1.1rem;
      color: #555;
      margin-top: 4px;
    }

    section {
      margin-bottom: 40px;
    }

    h2 {
      border-bottom: 2px solid #007bff;
      padding-bottom: 5px;
      margin-bottom: 20px;
      color: #007bff;
    }

    iframe {
      width: 100%;
      border: none;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .spotify iframe {
      height: 80px;
    }

    .youtube iframe {
      height: 180px;
    }

    .social-links a {
      display: inline-block;
      margin-right: 15px;
      margin-bottom: 10px;
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
    }

    .social-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
